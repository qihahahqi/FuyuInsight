<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 投资理财管理系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background: #1a1a2e;
        }
        .admin-container {
            display: flex;
            min-height: 100vh;
        }
        .admin-sidebar {
            width: 240px;
            background: #16213e;
            border-right: 1px solid #0f3460;
        }
        .admin-header {
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            padding: 16px 24px;
        }
        .admin-header h1 {
            color: #e94560;
            font-size: 20px;
        }
        .admin-content {
            flex: 1;
            padding: 24px;
            background: #1a1a2e;
        }
        .admin-nav-item {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            color: #a0a0a0;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .admin-nav-item:hover {
            background: #0f3460;
            color: #e94560;
        }
        .admin-nav-item.active {
            background: #0f3460;
            color: #e94560;
            border-left: 3px solid #e94560;
        }
        .stat-card {
            background: #16213e;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #0f3460;
        }
        .stat-card .stat-label {
            color: #a0a0a0;
        }
        .stat-card .stat-value {
            color: #e94560;
        }
        .admin-card {
            background: #16213e;
            border-radius: 12px;
            border: 1px solid #0f3460;
            margin-bottom: 24px;
        }
        .admin-card .card-header {
            background: #0f3460;
            border-bottom: 1px solid #0f3460;
            padding: 16px 20px;
        }
        .admin-card .card-header h3 {
            color: #fff;
        }
        .admin-card .card-body {
            padding: 20px;
        }
        .data-table {
            color: #fff;
        }
        .data-table th {
            background: #0f3460;
            color: #a0a0a0;
        }
        .data-table td {
            border-bottom: 1px solid #0f3460;
        }
        .data-table tbody tr:hover {
            background: #0f3460;
        }
        .btn-admin {
            background: #e94560;
            color: white;
        }
        .btn-admin:hover {
            background: #c73e54;
        }
        .btn-warning {
            background: #f39c12;
            color: white;
        }
        .btn-warning:hover {
            background: #d68910;
        }
        .tag {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .tag.admin {
            background: rgba(233, 69, 96, 0.2);
            color: #e94560;
        }
        .tag.active {
            background: rgba(40, 167, 69, 0.2);
            color: #28a745;
        }
        .tag.inactive {
            background: rgba(108, 117, 125, 0.2);
            color: #6c757d;
        }
        .admin-section {
            display: none;
        }
        .admin-section.active {
            display: block;
        }
        .user-info {
            color: #a0a0a0;
            font-size: 12px;
            margin-left: auto;
        }
        .logout-btn {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #e94560;
            color: white;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- 侧边栏 -->
        <aside class="admin-sidebar">
            <div class="logo" style="padding: 20px; border-bottom: 1px solid #0f3460;">
                <h2 style="color: #e94560;">管理后台</h2>
            </div>
            <nav class="nav-menu">
                <a class="admin-nav-item active" data-section="users">
                    <span class="icon">👥</span>
                    <span class="text">用户管理</span>
                </a>
                <a class="admin-nav-item" data-section="positions">
                    <span class="icon">💼</span>
                    <span class="text">持仓管理</span>
                </a>
            </nav>
            <div style="padding: 20px; border-top: 1px solid #0f3460; margin-top: auto;">
                <button class="logout-btn" onclick="adminLogout()">退出登录</button>
            </div>
        </aside>

        <!-- 主内容区 -->
        <main class="admin-content">
            <div class="admin-header" style="display: flex; align-items: center;">
                <h1>管理后台</h1>
                <div class="user-info">
                    当前用户: <span id="current-admin">Admin</span>
                </div>
            </div>

            <!-- 用户管理 -->
            <div id="section-users" class="admin-section active">
                <div class="admin-card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>用户列表</h3>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户名</th>
                                        <th>邮箱</th>
                                        <th>状态</th>
                                        <th>角色</th>
                                        <th>持仓数</th>
                                        <th>交易数</th>
                                        <th>注册时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table-body">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 持仓管理 -->
            <div id="section-positions" class="admin-section">
                <div class="admin-card">
                    <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <h3>所有用户持仓</h3>
                        <div style="display: flex; gap: 8px;">
                            <select id="admin-user-filter" class="form-input" style="width: 150px;" onchange="filterPositionsByUser()">
                                <option value="">全部用户</option>
                            </select>
                            <button class="btn btn-admin" onclick="showAdminPositionModal()">新增持仓</button>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>ID</th>
                                        <th>用户</th>
                                        <th>标的</th>
                                        <th>类型</th>
                                        <th>数量</th>
                                        <th>成本价</th>
                                        <th>现价</th>
                                        <th>收益率</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="positions-table-body">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 持仓编辑模态框 -->
    <div class="modal-overlay" id="position-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="position-modal-title">新增持仓</h3>
                <button class="modal-close" onclick="closePositionModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="position-id">
                <div class="form-group">
                    <label>所属用户 *</label>
                    <select id="position-user-id" class="form-input" required>
                        <option value="">选择用户</option>
                    </select>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>标的代码 *</label>
                        <input type="text" id="position-symbol" class="form-input" placeholder="如: 510300" required>
                    </div>
                    <div class="form-group">
                        <label>标的名称 *</label>
                        <input type="text" id="position-name" class="form-input" placeholder="如: 沪深300ETF" required>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>资产类型</label>
                        <select id="position-asset-type" class="form-input">
                            <option value="etf_index">宽基ETF</option>
                            <option value="etf_sector">行业ETF</option>
                            <option value="fund">基金</option>
                            <option value="stock">股票</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>持仓数量 *</label>
                        <input type="number" id="position-quantity" class="form-input" placeholder="数量" required>
                    </div>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>成本价 *</label>
                        <input type="number" id="position-cost-price" class="form-input" step="0.0001" placeholder="成本价" required>
                    </div>
                    <div class="form-group">
                        <label>现价</label>
                        <input type="number" id="position-current-price" class="form-input" step="0.0001" placeholder="现价">
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closePositionModal()">取消</button>
                <button class="btn btn-admin" onclick="saveAdminPosition()">保存</button>
            </div>
        </div>
    </div>

    <!-- 重置密码模态框 -->
    <div class="modal-overlay" id="reset-password-modal">
        <div class="modal">
            <div class="modal-header">
                <h3>重置用户密码</h3>
                <button class="modal-close" onclick="closeResetPasswordModal()">&times;</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="reset-user-id">
                <div class="form-group">
                    <label>新密码</label>
                    <input type="text" id="new-password" class="form-input" value="123456" placeholder="输入新密码">
                </div>
                <p style="color: var(--text-secondary); font-size: 12px;">默认密码: 123456</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeResetPasswordModal()">取消</button>
                <button class="btn btn-admin" onclick="confirmResetPassword()">确认重置</button>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
